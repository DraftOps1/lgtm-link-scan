services:
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm-link-scan-lgtm
    environment:
      ENABLE_LOGS_ALL: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
      - "${PROMETHEUS_PORT:-9090}:9090"
      - "${LOKI_PORT:-3100}:3100"
      - "${TEMPO_PORT:-3200}:3200"

  alloy:
    image: grafana/alloy:latest
    container_name: lgtm-link-scan-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    depends_on:
      - lgtm
    ports:
      - "${ALLOY_UI_PORT:-12345}:12345"
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - demoapp_logs:/var/log/demoapp:ro

  demoapp:
    build:
      context: ../..
      dockerfile: examples/docker-compose/demoapp/Dockerfile
    container_name: lgtm-link-scan-demoapp
    user: "0:0"
    depends_on:
      - alloy
    environment:
      APP_ADDR: ":8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4318"
      TRACE_SERVICE_NAME: "${TRACE_SERVICE_NAME}"
      LOG_SERVICE_NAME: "${LOG_SERVICE_NAME}"
      METRIC_SERVICE_NAME: "${METRIC_SERVICE_NAME}"
      SERVICE_NAMESPACE: "${SERVICE_NAMESPACE}"
      DEPLOYMENT_ENVIRONMENT: "${DEPLOYMENT_ENVIRONMENT}"
      LOG_CORRELATION_MODE: "${LOG_CORRELATION_MODE}"
      EXEMPLAR_MODE: "${EXEMPLAR_MODE}"
      LOG_FILE: "/var/log/demoapp/app.log"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - demoapp_logs:/var/log/demoapp

  loadgen:
    image: busybox:1.36
    container_name: lgtm-link-scan-loadgen
    depends_on:
      - demoapp
    command:
      - sh
      - -c
      - |
        while true; do
          wget -q -O - "http://demoapp:8080/checkout?sku=sku-123" >/dev/null 2>&1
          sleep 1
        done

volumes:
  demoapp_logs:
